site_name: Home Builder 5 Documentation
site_description: Free Blender add-on for designing interior spaces with cabinets
site_author: Andrew Peel
site_url: https://creativedesigner3d.github.io/home_builder_docs/

repo_name: CreativeDesigner3D/home_builder_5
repo_url: https://github.com/CreativeDesigner3D/home_builder_5

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.keys
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CreativeDesigner3D
    - icon: fontawesome/brands/discord
      link: https://creativedesigner3d.com/discord/

copyright: Copyright &copy; 2024-2026 Andrew Peel

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - Troubleshooting: troubleshooting.md
